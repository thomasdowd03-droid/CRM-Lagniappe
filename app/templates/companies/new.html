{% extends "base.html" %}
{% block title %}Add company · Lagniappe CRM{% endblock %}
{% block heading %}Add company{% endblock %}
{% block content %}
  <a href="{{ url_for('companies.list_companies') }}" class="text-sm text-brand hover:underline">← All companies</a>

  <form method="post" class="mt-6 max-w-2xl space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Company name *</label>
      <input name="name" required value="{{ form.get('name','') }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Website</label>
        <input name="website" value="{{ form.get('website','') }}" placeholder="example.com" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
        <select name="category" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white">
          {% for opt in ['', 'Distributor', 'Brand / Private-label', 'Retailer', 'Restaurant / Foodservice', 'Competitor', 'Other'] %}
            <option value="{{ opt }}" {% if form.get('category','') == opt %}selected{% endif %}>{{ opt or '—' }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">City</label>
        <input name="city" value="{{ form.get('city','') }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">State / Region</label>
        <input name="region" value="{{ form.get('region','') }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
        <select name="status" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white">
          {% for opt in ['lead', 'prospect', 'customer', 'archived'] %}
            <option value="{{ opt }}" {% if form.get('status','') == opt %}selected{% endif %}>{{ opt|capitalize }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Notes / description</label>
      <textarea name="description" rows="4" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">{{ form.get('description','') }}</textarea>
    </div>

    <button type="submit" class="px-5 py-2.5 rounded-lg bg-brand text-white text-sm font-medium hover:bg-brand-dark">Save company</button>
  </form>
{% endblock %}
