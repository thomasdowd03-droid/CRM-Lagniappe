{% extends "base.html" %}
{% block title %}Add contact · Lagniappe CRM{% endblock %}
{% block heading %}Add contact{% endblock %}
{% block content %}
  <a href="{{ url_for('contacts.list_contacts') }}" class="text-sm text-brand hover:underline">← All contacts</a>

  <form method="post" class="mt-6 max-w-2xl space-y-5">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">First name</label>
        <input name="first_name" value="{{ form.get('first_name','') }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Last name</label>
        <input name="last_name" value="{{ form.get('last_name','') }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
      <input name="title" value="{{ form.get('title','') }}" placeholder="Purchasing Manager" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input name="email" type="email" value="{{ form.get('email','') }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
        <input name="phone" value="{{ form.get('phone','') }}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Company</label>
      <select name="company_id" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white">
        <option value="">— None —</option>
        {% for co in companies %}
          <option value="{{ co.id }}" {% if (form.get('company_id','') == co.id|string) or (preselect and preselect == co.id) %}selected{% endif %}>{{ co.name }}</option>
        {% endfor %}
      </select>
      <p class="text-xs text-slate-400 mt-1">Don't see the company? <a href="{{ url_for('companies.new_company') }}" class="text-brand hover:underline">Add it first</a>.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
      <select name="status" class="w-full max-w-xs rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white">
        {% for opt in ['lead', 'prospect', 'customer', 'archived'] %}
          <option value="{{ opt }}" {% if form.get('status','') == opt %}selected{% endif %}>{{ opt|capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="px-5 py-2.5 rounded-lg bg-brand text-white text-sm font-medium hover:bg-brand-dark">Save contact</button>
  </form>
{% endblock %}
