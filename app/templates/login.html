<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Lagniappe CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Montserrat', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
      colors: { navy: { DEFAULT: '#16263f' }, brand: { DEFAULT: '#0f766e', dark: '#0b5e57' } }
    } } }
  </script>
  <style>body { font-family: 'Montserrat', system-ui, sans-serif; }</style>
</head>
<body class="bg-navy">
  <div class="max-w-sm mx-auto mt-28 bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-6">
      <div class="text-xl font-bold text-navy flex items-center justify-center gap-2"><span>🦐</span> Lagniappe</div>
      <div class="text-xs text-slate-400 mt-1 italic">Seafood, with a little something extra</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 rounded-lg px-4 py-2 text-sm bg-red-50 text-red-700 border border-red-200">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <label class="block text-sm font-medium text-slate-700 mb-1">Team password</label>
      <input name="password" type="password" autofocus required
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-brand focus:ring-1 focus:ring-brand outline-none">
      <button type="submit"
              class="mt-4 w-full px-4 py-2 rounded-lg bg-brand hover:bg-brand-dark text-white text-sm font-semibold transition-colors">Sign in</button>
    </form>
  </div>
</body>
</html>
